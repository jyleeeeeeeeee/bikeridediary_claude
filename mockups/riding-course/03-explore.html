<!--
  화면명: 라이딩 코스 홈 — 탐색 탭
  요구사항: #6 탐색 탭 활성, #8 검색창 + 전체 코스 리스트, #9 리스트 아이템 구성,
            #10 즐겨찾기 별 토글 (노란=등록, 회색=미등록), #11 아이템 클릭 → 상세
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BRD 목업 — 탐색 탭</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="phone-wrap">
  <div class="phone">
    <div class="phone-body">

      <!-- AppBar -->
      <div class="appbar">
        <a href="01-home-expanded-menu.html" class="appbar-back">‹</a>
        <div class="appbar-title">라이딩 코스</div>
      </div>

      <!-- 탭바: 탐색 활성 -->
      <div class="tab-bar">
        <a href="02-my-courses.html" class="tab-item">내 코스</a>
        <a href="03-explore.html" class="tab-item active">탐색</a>
      </div>

      <!-- 컨텐츠 -->
      <div class="scroll-content">

        <!-- 검색창 -->
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input class="search-input" type="text" placeholder="코스명, 지역으로 검색" readonly>
        </div>

        <!-- 결과 수 라벨 -->
        <div style="font-size:13px; color:var(--color-text-secondary); margin-bottom:10px; padding:0 2px;">
          전체 코스 · 6개
        </div>

        <!--
          탐색 탭 코스 아이템:
          - 우측에 즐겨찾기 별 토글 (소유 마커 아님)
          - 별 클릭 시 on/off 전환
        -->

        <!-- 즐겨찾기 ON (노란별) -->
        <a href="04-course-detail-mine.html" class="course-card" id="card1">
          <div class="course-info">
            <div class="course-name">한계령 와인딩 코스</div>
            <div class="course-meta">
              <span>128.4 km</span>
              <span class="course-meta-dot"></span>
              <span>jyl93</span>
            </div>
          </div>
          <button class="star-btn" onclick="toggleStar(event, this)">
            <span class="star-on">⭐</span>
          </button>
        </a>

        <!-- 즐겨찾기 OFF (회색별) -->
        <a href="04-course-detail-mine.html" class="course-card" id="card2">
          <div class="course-info">
            <div class="course-name">대관령 업힐 루트</div>
            <div class="course-meta">
              <span>94.0 km</span>
              <span class="course-meta-dot"></span>
              <span>라이더K</span>
            </div>
          </div>
          <button class="star-btn" onclick="toggleStar(event, this)">
            <span class="star-off">☆</span>
          </button>
        </a>

        <!-- 즐겨찾기 ON -->
        <a href="04-course-detail-mine.html" class="course-card" id="card3">
          <div class="course-info">
            <div class="course-name">제주 해안도로 완주</div>
            <div class="course-meta">
              <span>210.8 km</span>
              <span class="course-meta-dot"></span>
              <span>jeju_rider</span>
            </div>
          </div>
          <button class="star-btn" onclick="toggleStar(event, this)">
            <span class="star-on">⭐</span>
          </button>
        </a>

        <!-- 즐겨찾기 OFF -->
        <a href="04-course-detail-mine.html" class="course-card" id="card4">
          <div class="course-info">
            <div class="course-name">남해 바래길 해안코스</div>
            <div class="course-meta">
              <span>156.3 km</span>
              <span class="course-meta-dot"></span>
              <span>바다라이더</span>
            </div>
          </div>
          <button class="star-btn" onclick="toggleStar(event, this)">
            <span class="star-off">☆</span>
          </button>
        </a>

        <!-- 즐겨찾기 OFF -->
        <a href="04-course-detail-mine.html" class="course-card" id="card5">
          <div class="course-info">
            <div class="course-name">춘천 의암호 일주</div>
            <div class="course-meta">
              <span>67.2 km</span>
              <span class="course-meta-dot"></span>
              <span>jyl93</span>
            </div>
          </div>
          <button class="star-btn" onclick="toggleStar(event, this)">
            <span class="star-off">☆</span>
          </button>
        </a>

        <!-- 즐겨찾기 ON -->
        <a href="04-course-detail-mine.html" class="course-card" id="card6">
          <div class="course-info">
            <div class="course-name">설악산 미시령 코스</div>
            <div class="course-meta">
              <span>88.1 km</span>
              <span class="course-meta-dot"></span>
              <span>알피니스트</span>
            </div>
          </div>
          <button class="star-btn" onclick="toggleStar(event, this)">
            <span class="star-on">⭐</span>
          </button>
        </a>

        <div style="height: 16px;"></div>
      </div>

    </div>

    <!-- 프로토타입 네비게이션 -->
    <div class="proto-nav">
      <a href="02-my-courses.html">← 내 코스 탭</a>
      <span class="proto-screen-label">03 탐색 탭</span>
      <a href="04-course-detail-mine.html">코스 상세 →</a>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
function toggleStar(event, btn) {
  // 링크 이동 방지
  event.preventDefault();
  event.stopPropagation();

  const isOn = btn.querySelector('.star-on');
  if (isOn) {
    // OFF로 전환
    btn.innerHTML = '<span class="star-off">☆</span>';
    showToast('즐겨찾기에서 제거했습니다.');
  } else {
    // ON으로 전환
    btn.innerHTML = '<span class="star-on">⭐</span>';
    showToast('즐겨찾기에 추가했습니다.');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
